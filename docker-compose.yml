services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: clinic_app
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - db
      - redis
    networks:
      - clinic_net

  web:
    image: nginx:stable-alpine
    container_name: clinic_web
    ports:
      - "8020:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - clinic_net

  frontend:
    image: node:22-alpine
    container_name: clinic_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    networks:
      - clinic_net

  db:
    image: mysql:8.4
    container_name: clinic_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clinic
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: clinic
      MYSQL_PASSWORD: clinic
    ports:
      - "3307:3306"
    volumes:
      - clinic_db_data:/var/lib/mysql
    networks:
      - clinic_net

  redis:
    image: redis:7-alpine
    container_name: clinic_redis
    ports:
      - "6379:6379"
    networks:
      - clinic_net

volumes:
  clinic_db_data:

networks:
  clinic_net:
    driver: bridge
